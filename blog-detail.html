<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post - Writania</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    a, a:hover, h1, h2, h3, h4, h5, h6 { text-decoration: none !important; }
  </style>
  <style>
    .blog-header {
      padding: 100px 0 60px;
      text-align: center;
      background: linear-gradient(180deg, var(--bg-color) 0%, white 100%);
      border-bottom: 1px solid var(--border);
    }

    .blog-header-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .title-area {
      margin-bottom: 32px;
    }

    .blog-meta-top {
      display: flex;
      justify-content: center;
      gap: 16px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .author-card-top {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 8px 24px 8px 8px;
      border-radius: 40px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      text-align: left;
      margin-top: 16px;
    }

    .author-card-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .blog-content-wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    .content-body {
      font-size: 1.125rem;
      line-height: 1.8;
      color: var(--text-primary);
    }

    .content-body p {
      margin-bottom: 24px;
    }

    .content-body h2, .content-body h3 {
      margin-top: 40px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin: 60px 0;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      color: var(--text-secondary);
      background: transparent;
      padding: 8px 16px;
      border-radius: 20px;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: rgba(0,0,0,0.05);
      color: var(--text-primary);
    }

    .action-btn i {
      transition: transform 0.2s ease;
    }

    .comments-section {
      max-width: 760px;
      margin: 0 auto 100px;
      padding: 0 24px;
    }

    /* --- Share Card Modal --- */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
        display: none; align-items: center; justify-content: center; z-index: 2000;
        animation: fadeIn 0.3s ease;
    }
    .modal-content {
        background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 500px;
        position: relative; box-shadow: var(--shadow-hover);
    }
    .share-card-preview {
        background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 20px;
        padding: 30px; color: white; position: relative; overflow: hidden;
        margin-bottom: 24px; box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
    }
    .share-card-preview::before {
        content: 'W'; position: absolute; bottom: -20px; right: -20px;
        font-size: 10rem; font-weight: 900; opacity: 0.1; color: white;
    }
    .share-card-footer {
        display: flex; align-items: center; gap: 12px;
    }
    .share-card-avatar {
        width: 44px; height: 44px; border-radius: 50%; border: 2px solid white; background: white;
    }
    .share-card-branding {
        margin-left: auto; font-family: var(--font-cursive); font-size: 1rem;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="main-nav"></nav>

  <div id="blogDetailArea">
    <!-- Header -->
    <header class="blog-header">
      <div class="blog-header-content">
        <div style="text-align: left; margin-bottom: 24px;">
          <a href="blogs.html" class="action-btn" style="display: inline-flex; padding: 0; background: transparent; font-weight: 700; color: var(--primary);">
            <i class="fa-solid fa-arrow-left-long"></i> Back to Discovery
          </a>
        </div>
        <div class="blog-meta-top">
          <span class="badge" id="blogCategory" style="background: white; border: 1px solid var(--border);">Category</span>
          <span id="blogDate">Date</span>
          <span id="blogReadingTime">Time</span>
        </div>
        
        <h1 class="title-area" id="blogTitle" style="font-size: 3rem; font-weight: 800; line-height: 1.2;">Loading...</h1>
        
        <div class="author-card-top">
          <div class="author-card-avatar" id="authorAvatar"></div>
          <div>
            <div style="font-weight: 700; color: var(--text-primary);" id="authorName">Author Name</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary);" id="authorDetails">...</div>
          </div>
        </div>
        
        <img id="blogHeroImage" src="" style="width: 100%; height: 400px; object-fit: cover; border-radius: var(--radius-lg); margin-top: 40px; box-shadow: var(--shadow-md);">
      </div>
    </header>

    <!-- Content -->
    <main class="blog-content-wrapper">

      <!-- Main Body -->
      <article class="content-body" id="blogContent">
        <!-- Injected via JS -->
      </article>

      <!-- Action Bar -->
      <div class="action-bar">
        <div style="display: flex; gap: 16px;">
          <button class="action-btn" id="likeBtn">
            <i class="fa-regular fa-heart"></i>
            <span id="likeCount">0</span> Likes
          </button>
          <button class="action-btn" id="actionBarCommentBtn">
            <i class="fa-regular fa-comment"></i>
            <span id="actionBarCommentCount">0</span> Comments
          </button>
          <button class="action-btn" id="bookmarkBtn" onclick="toggleBookmarkDetailPage()">
            <i class="fa-regular fa-bookmark"></i> Bookmark
          </button>
        </div>
        <div style="display: flex; gap: 12px;">
          <button class="action-btn" onclick="exportBlog()">
            <i class="fa-solid fa-download"></i> Export
          </button>
          <button class="action-btn" id="shareBlogBtn">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> Share
          </button>
        </div>
      </div>
    </main>

    <!-- Fake Comments Section -->
    <section class="comments-section">
      <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 24px;" id="commentSectionTitle">Discussion (0)</h3>
      <div style="background: var(--bg-color); padding: 24px; border-radius: var(--radius-lg); margin-bottom: 32px;">
        <textarea id="commentTextarea" class="input-field" placeholder="What are your thoughts?" style="height: 100px; resize: vertical; margin-bottom: 16px; background: white;"></textarea>
        <button id="postCommentBtn" class="btn btn-primary" style="font-size: 0.9rem; padding: 8px 20px;">Post Comment</button>
      </div>
      
      <div id="commentList">
        <!-- Comments injected by JS -->
      </div>
    </section>
  </div>

  <!-- Share Card Modal -->
  <div id="shareModal" class="modal-overlay">
      <div class="modal-content">
          <button onclick="closeShareModal()" style="position:absolute; top:20px; right:20px; font-size:1.5rem; color:var(--text-secondary);"><i class="fa-solid fa-xmark"></i></button>
          <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 8px;">Share to <span class="text-cursive" style="color:var(--primary)">Socials</span></h2>
          <p style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:24px;">Download this branded card to promote your story.</p>
          
          <div id="shareCard" class="share-card-preview">
              <h3 id="modalBlogTitle" style="font-weight: 800; margin-bottom: 10px;"></h3>
              <div class="share-card-footer">
                  <div id="modalAvatar" class="share-card-avatar"></div>
                  <div>
                      <div id="modalAuthor" style="font-weight:700; font-size:0.9rem;">Author Name</div>
                      <div style="font-size:0.75rem; opacity:0.8;">Writania Creator</div>
                  </div>
                  <div class="share-card-branding"><i class="fa-solid fa-feather-pointed"></i> Writania</div>
              </div>
          </div>
          
          <button onclick="downloadShareCard()" class="btn btn-primary" style="width:100%; padding:14px;"><i class="fa-solid fa-download"></i> Download Image Card</button>
      </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/blog.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize Bookmark Button State
      const params = new URLSearchParams(window.location.search);
      const blogId = parseInt(params.get('id'));
      const bookmarks = JSON.parse(localStorage.getItem('writania_bookmarks')) || [];
      const bookmarkBtn = document.getElementById('bookmarkBtn');
      
      if (bookmarks.includes(blogId)) {
        bookmarkBtn.innerHTML = '<i class="fa-solid fa-bookmark" style="color:var(--primary)"></i> Bookmarked';
      }

      window.toggleBookmarkDetailPage = () => {
        toggleBookmark(blogId);
        const updated = JSON.parse(localStorage.getItem('writania_bookmarks')) || [];
        if (updated.includes(blogId)) {
          bookmarkBtn.innerHTML = '<i class="fa-solid fa-bookmark" style="color:var(--primary)"></i> Bookmarked';
        } else {
          bookmarkBtn.innerHTML = '<i class="fa-regular fa-bookmark"></i> Bookmark';
        }
      };

      window.exportBlog = () => {
        const title = document.getElementById('blogTitle').innerText;
        const author = document.getElementById('authorName').innerText;
        const date = document.getElementById('blogDate').innerText;
        const content = document.getElementById('blogContent').innerText;

        const fileContent = `
TITLE: ${title}
AUTHOR: ${author}
DATE: ${date}

--- CONTENT ---
${content}

---
Exported from Writania Blogging Platform
        `;

        const blob = new Blob([fileContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showToast('Blog exported successfully!', 'success');
      };
      window.openShareModal = () => {
          document.getElementById('modalBlogTitle').innerText = document.getElementById('blogTitle').innerText;
          document.getElementById('modalAuthor').innerText = document.getElementById('authorName').innerText;
          document.getElementById('modalAvatar').innerHTML = document.getElementById('authorAvatar').innerHTML;
          document.getElementById('shareModal').style.display = 'flex';
      };

      window.closeShareModal = () => {
          document.getElementById('shareModal').style.display = 'none';
      };

      window.downloadShareCard = () => {
          showToast('Preparing your share card...', 'info');
          // In a real env, we'd use html2canvas. For now, simulated download.
          setTimeout(() => {
              showToast('Share card downloaded! Ready for Instagram/Twitter.', 'success');
              closeShareModal();
          }, 1500);
      };

      document.getElementById('shareBlogBtn').onclick = openShareModal;
    });
  </script>
</body>
</html>

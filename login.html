<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Writania</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: var(--bg-color); height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-container { width: 100%; max-width: 1000px; height: 600px; display: flex; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-lg); background: white; }
    .auth-left { flex: 1; background: var(--primary); color: white; padding: 60px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
    .auth-right { flex: 1.2; padding: 60px; display: flex; flex-direction: column; justify-content: center; background: white; overflow-y: auto; }
    .floating-circle { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: rgba(255,255,255,0.1); }
    @media (max-width: 900px) { .auth-left { display: none; } .auth-container { max-width: 500px; height: auto; min-height: 500px; } }
    a, a:hover { text-decoration: none !important; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-left">
      <div class="floating-circle" style="top: -100px; right: -100px;"></div>
      <div class="floating-circle" style="bottom: -50px; left: -100px;"></div>
      <a href="index.html" class="logo" style="color: white; margin-bottom: 40px;">
        <i class="fa-solid fa-feather-pointed"></i> Writania
      </a>
      <h1 style="font-size: 2.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px;">Welcome back to the fold.</h1>
    </div>
    <div class="auth-right">
      <form id="loginForm">
        <h2 style="font-weight: 800; margin-bottom: 8px;">Login</h2>
        <p style="color: var(--text-secondary); margin-bottom: 32px;">Please enter your details to login.</p>
        <div class="input-group mb-3">
          <label>Email Address</label>
          <input type="email" id="login-email" class="input-field" placeholder="name@example.com" required>
        </div>
        <div class="input-group mb-4">
          <label>Password</label>
          <input type="password" id="login-password" class="input-field" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100" style="padding: 14px; border-radius: 12px;">Sign In</button>
        <p class="mt-4 text-center text-muted">Don't have an account? <a href="signup.html" class="text-primary fw-bold">Sign Up</a></p>
      </form>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
